spring.application.name=Smart Attendance System Using Geo-Location
server.port=${SERVER_PORT:8081}

# MySQL Configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smart_attendance_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Nathin@1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:THIS_IS_A_DEMO_SECRET_CHANGE_IT_TO_AT_LEAST_32_CHARACTERS_LONG_123}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Default admin bootstrap
app.admin.name=${ADMIN_NAME:System Admin}
app.admin.email=${ADMIN_EMAIL:admin@smartattendance.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# CORS (comma-separated list)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:null,http://localhost:5500,http://127.0.0.1:5500,http://localhost:5501,http://127.0.0.1:5501,http://localhost:8081,http://127.0.0.1:8081,http://localhost:8080,http://127.0.0.1:8080}

spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# Attendance Rules (real-life policy controls)
app.attendance.start-time=${ATTENDANCE_START_TIME:09:00}
app.attendance.end-time=${ATTENDANCE_END_TIME:16:30}
app.attendance.late-after=${ATTENDANCE_LATE_AFTER:09:30}
app.attendance.allow-weekend=${ATTENDANCE_ALLOW_WEEKEND:false}
app.attendance.max-accuracy-meters=${ATTENDANCE_MAX_ACCURACY_METERS:150}

# Default geofence bootstrap values
app.geofence.default-latitude=${GEOFENCE_DEFAULT_LATITUDE:12.9716}
app.geofence.default-longitude=${GEOFENCE_DEFAULT_LONGITUDE:77.5946}
app.geofence.default-radius=${GEOFENCE_DEFAULT_RADIUS:500.0}
